name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ---------------------------------------------------------------------------
  # Standard test job — no external dependencies required
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov mock numpy
        # Note: The test suite uses Python-level mocking for PyQt6, PySide6, and RDKit
        # to ensure fast, headless execution without X-servers or heavy dependencies.

    - name: Test with pytest
      run: |
        python -m pytest --cov=pyscf_calculator tests/ -v

  # ---------------------------------------------------------------------------
  # Integration test job — clones the main MoleditPy app to enable real
  # PluginContext tests (TestWithRealPluginContext in test_plugin_integration.py)
  # ---------------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov mock numpy

    - name: Clone main MoleditPy application
      # Clone beside the plugin repo so the relative path ../python_molecular_editor
      # matches the CI_MAIN_APP_SRC env var set below.
      # 'continue-on-error: false' so we catch network failures explicitly.
      run: |
        git clone --depth 1 \
          https://github.com/HiroYokoyama/python_molecular_editor.git \
          ../python_molecular_editor

    - name: Install main app Python package (editable, no extras)
      # Install only the package metadata so PluginContext can be imported.
      # We skip heavy GUI deps (pyvista, PyQt6) — they are mocked in tests.
      run: |
        pip install -e ../python_molecular_editor/moleditpy \
          --no-deps --quiet || true

    - name: Test with real PluginContext
      env:
        CI_MAIN_APP_SRC: ${{ github.workspace }}/../python_molecular_editor/moleditpy/src
      run: |
        python -m pytest tests/test_plugin_integration.py -v
