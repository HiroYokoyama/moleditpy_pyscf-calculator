name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov mock
        # Note: The test suite uses Python-level mocking for PyQt6, PySide6, and RDKit
        # to ensure fast, headless execution without X-servers or heavy dependencies.
        # So we only need pytest and mock.
        
    - name: Test with pytest
      run: |
        python -m pytest --cov=pyscf_calculator tests/ -v
